<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>
        <meta http-equiv="pragma" content="no-cache"/>
        <title>Shadow Blocks: Mystical Match - Alastis Dev</title>
        <meta name="description" content="Shadow Blocks: Mystical Match - logic puzzle match-3 game by Alastis Dev. Play free in your browser.">
        <meta name="author" content="Alastis Dev - Marek Banas">

        <!-- Google Analytics 4 -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-J92094KPM1"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-J92094KPM1');
        </script>

        <style>
            html, body {
                background: #000;
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            #gm4html5_div_id {
                width: 100vw;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            canvas {
                image-rendering: optimizeSpeed;
                -ms-touch-action: none;
                touch-action: none;
                display: block;
            }

            /* ===== FEEDBACK SYSTEM ===== */
            /* FLOATING BUTTON */
            #fbOpenBtn {
                position: fixed; bottom: 20px; right: 20px;
                z-index: 9998;
                background: #00d4ff; color: #000;
                font-family: sans-serif; font-size: 14px; font-weight: 700;
                letter-spacing: 1px;
                padding: 12px 20px; border: 2px solid #000;
                border-radius: 8px; cursor: pointer;
                box-shadow: 0 4px 16px rgba(0,212,255,0.4);
                transition: transform 0.2s;
            }
            #fbOpenBtn:hover { transform: scale(1.06); background: #4de8ff; }

            /* MODAL OVERLAY */
            .fb-modal {
                display: none;
                position: fixed; inset: 0;
                background: rgba(0,0,0,0.85);
                z-index: 9999;
                align-items: center; justify-content: center;
                padding: 20px;
            }
            .fb-box {
                background: #14141c; color: #fff;
                border: 2px solid #00d4ff;
                border-radius: 12px;
                padding: 28px; max-width: 420px; width: 100%;
                position: relative;
                font-family: sans-serif;
                box-shadow: 0 8px 40px rgba(0,212,255,0.3);
                box-sizing: border-box;
            }
            .fb-box h2 { margin: 0 0 8px; font-size: 22px; color: #00d4ff; }
            .fb-box p { margin: 0 0 20px; font-size: 14px; color: #aaa; line-height: 1.4; }
            .fb-close {
                position: absolute; top: 12px; right: 16px;
                background: none; border: none; color: #888;
                font-size: 28px; cursor: pointer; line-height: 1;
            }
            .fb-close:hover { color: #fff; }

            /* RATING STARS */
            .fb-rating { margin-bottom: 16px; }
            .fb-rating > span { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
            .fb-stars {
                display: inline-flex; flex-direction: row-reverse;
                gap: 4px;
            }
            .fb-stars input { display: none; }
            .fb-stars label {
                font-size: 32px; color: #444; cursor: pointer;
                transition: color 0.15s;
            }
            .fb-stars label:hover,
            .fb-stars label:hover ~ label,
            .fb-stars input:checked ~ label { color: #ffd24a; }

            /* INPUTS */
            .fb-box textarea, .fb-box input[type="email"] {
                width: 100%; box-sizing: border-box;
                background: #0c0c12; color: #fff;
                border: 1px solid #333; border-radius: 6px;
                padding: 12px; margin-bottom: 12px;
                font-family: sans-serif; font-size: 14px;
                resize: vertical;
            }
            .fb-box textarea:focus, .fb-box input:focus {
                outline: none; border-color: #00d4ff;
            }
            .fb-submit {
                width: 100%; background: #00d4ff; color: #000;
                border: none; border-radius: 6px;
                padding: 14px; font-size: 15px; font-weight: 700;
                cursor: pointer; letter-spacing: 1px;
                transition: background 0.2s;
            }
            .fb-submit:hover { background: #4de8ff; }

            .fb-thanks {
                display: none; text-align: center;
                padding: 20px; font-size: 16px; color: #00d4ff;
            }

            @media (max-width: 480px) {
                #fbOpenBtn { bottom: 12px; right: 12px; padding: 10px 16px; font-size: 12px; }
                .fb-box { padding: 20px; }
            }
            /* ===== END FEEDBACK ===== */
        </style>

        <!-- Canvas auto-scale -->
        <script>
            window.addEventListener('load', function() {
                function rescaleCanvas() {
                    var canvas = document.getElementById('canvas');
                    if (!canvas) return;
                    
                    var nativeW = 1080;
                    var nativeH = 1920;
                    var winW = window.innerWidth;
                    var winH = window.innerHeight;
                    
                    var scaleH = winH / nativeH;
                    var scaleW = winW / nativeW;
                    var scale = Math.min(scaleH, scaleW);
                    
                    canvas.style.width = (nativeW * scale) + 'px';
                    canvas.style.height = (nativeH * scale) + 'px';
                }
                
                rescaleCanvas();
                window.addEventListener('resize', rescaleCanvas);
                setTimeout(rescaleCanvas, 1000);
            });
        </script>
    </head>

    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="1080" height="1920">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/Shadow_Blocks.js"></script>
        <script>window.onload = GameMaker_Init;</script>

        <!-- ===== FEEDBACK SYSTEM ===== -->
        <button id="fbOpenBtn" onclick="fbOpen()">
            💬 Feedback
        </button>

        <div id="fbModal" class="fb-modal">
            <div class="fb-box">
                <button class="fb-close" onclick="document.getElementById('fbModal').style.display='none'">×</button>
                <h2>Got feedback?</h2>
                <p>Found a bug? Love it? Hate it? Tell me — I read everything.</p>

                <form action="https://formspree.io/f/mvzyzlby" method="POST" id="fbForm">
                    <div class="fb-rating">
                        <span>How was it?</span>
                        <div class="fb-stars">
                            <input type="radio" name="rating" value="5" id="s5"><label for="s5">★</label>
                            <input type="radio" name="rating" value="4" id="s4"><label for="s4">★</label>
                            <input type="radio" name="rating" value="3" id="s3"><label for="s3">★</label>
                            <input type="radio" name="rating" value="2" id="s2"><label for="s2">★</label>
                            <input type="radio" name="rating" value="1" id="s1"><label for="s1">★</label>
                        </div>
                    </div>

                    <textarea name="message" placeholder="Your thoughts..." required rows="4"></textarea>
                    <input type="email" name="email" placeholder="Email (optional - if you want a reply)">
                    <input type="hidden" name="game" value="Shadow Blocks Web">
                    <input type="text" name="_gotcha" style="display:none">

                    <button type="submit" class="fb-submit">Send Feedback</button>
                </form>

                <div id="fbThanks" class="fb-thanks">
                    🙏 Thank you! Your feedback means a lot.
                </div>
            </div>
        </div>

        <script>
            var fbCanvas = document.getElementById('canvas');

            // Otwarcie modala - zablokuj input gry
            function fbOpen() {
                document.getElementById('fbModal').style.display = 'flex';
                if (fbCanvas) fbCanvas.style.pointerEvents = 'none';
                // Odbierz focus canvasowi GameMaker (przestaje lapac klawiature)
                if (fbCanvas && fbCanvas.blur) fbCanvas.blur();
            }

            // Zamkniecie modala - przywroc input gry
            function fbClose() {
                document.getElementById('fbModal').style.display = 'none';
                if (fbCanvas) fbCanvas.style.pointerEvents = 'auto';
            }

            // Podmien onclick przycisku zamykania (X)
            document.querySelector('.fb-close').onclick = fbClose;

            // Zatrzymaj propagacje eventow z modala do canvas GameMaker
            var fbBox = document.querySelector('.fb-box');
            ['keydown','keyup','keypress','pointerdown','pointerup','mousedown','mouseup','touchstart','touchend'].forEach(function(evt) {
                fbBox.addEventListener(evt, function(e) {
                    e.stopPropagation();
                }, true);
            });

            // Submit
            document.getElementById('fbForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var form = e.target;
                var data = new FormData(form);

                fetch(form.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                }).then(function(response) {
                    if (response.ok) {
                        form.style.display = 'none';
                        document.getElementById('fbThanks').style.display = 'block';
                        setTimeout(fbClose, 2500);
                    } else {
                        alert('Oops! Something went wrong. Please try again.');
                    }
                }).catch(function() {
                    alert('Network error. Please try again.');
                });
            });

            // Zamknij modal klikajac w tlo
            document.getElementById('fbModal').addEventListener('click', function(e) {
                if (e.target === this) fbClose();
            });
        </script>
        <!-- ===== END FEEDBACK ===== -->
    </body>
</html>
